replicaCount: 2

image:
  repository: aksgitopsdevacr.azurecr.io/node-app
  tag: "1.0.0"
  pullPolicy: IfNotPresent

service:
  port: 80
  targetPort: 3000

observability:
  signoz:
    enabled: false
    serviceName: node-app
    environment: signoz
    otlpEndpoint: http://$(HOST_IP):4318

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70

livenessProbe:
  path: /health
  initialDelaySeconds: 10
  periodSeconds: 15
  failureThreshold: 3

readinessProbe:
  path: /ready
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

podDisruptionBudget:
  enabled: true
  minAvailable: 1

serviceMonitor:
  enabled: true
  path: /metrics
  interval: 30s

prometheusRule:
  enabled: true

priorityClass:
  enabled: true
  value: 1000

resourceQuota:
  enabled: true
  maxPods: "50"
  requestsCpu: "10"
  requestsMemory: 20Gi
  limitsCpu: "20"
  limitsMemory: 40Gi

limitRange:
  enabled: true
