{{- if .Values.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: node-app-alerts
  labels:
    app: node-app
    release: kube-prometheus-stack
spec:
  groups:
    - name: node-app.rules
      rules:
        - alert: NodeAppHighErrorRate
          expr: |
            (
              rate(http_requests_total{status_code=~"5.."}[5m])
              / rate(http_requests_total[5m])
            ) > 0.01
            and
            rate(http_requests_total[5m]) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High error rate on node-app"
            description: "Error rate is above 1% for 5 minutes."

        - alert: NodeAppHighLatency
          expr: |
            histogram_quantile(0.99,
              rate(http_request_duration_seconds_bucket[5m])
            ) > 1
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High p99 latency on node-app"
            description: "p99 latency has exceeded 1s for 5 minutes."

        - alert: NodeAppPodCrashLooping
          expr: rate(kube_pod_container_status_restarts_total{pod=~"node-app.*"}[15m]) > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "node-app pod is crash-looping"
            description: "Pod {{ `{{ $labels.pod }}` }} has restarted more than once in 15 minutes."

        - alert: NodeAppPodNotReady
          expr: kube_pod_status_ready{pod=~"node-app.*", condition="true"} == 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "node-app pod not ready"
            description: "Pod {{ `{{ $labels.pod }}` }} has been not-ready for 5 minutes."

        - alert: NodeAppHighMemory
          expr: |
            container_memory_working_set_bytes{pod=~"node-app.*"}
            / container_spec_memory_limit_bytes{pod=~"node-app.*"} > 0.85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "node-app memory above 85%"
            description: "Pod {{ `{{ $labels.pod }}` }} is using more than 85% of its memory limit. OOM kill risk."

        - alert: NodeAppNoPodsRunning
          expr: |
            sum(kube_pod_status_ready{pod=~"node-app.*", condition="true"}) == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "No node-app pods running"
            description: "Zero node-app pods are ready. App is completely down."

        - alert: NodeAppSlowStartup
          expr: |
            kube_pod_container_status_ready{pod=~"node-app.*"} == 0
          for: 3m
          labels:
            severity: warning
          annotations:
            summary: "node-app pod slow to start"
            description: "Pod {{ `{{ $labels.pod }}` }} has not become ready within 3 minutes."
{{- end }}
