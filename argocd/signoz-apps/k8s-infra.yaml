apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: signoz-k8s-infra
  namespace: argocd
  annotations:
    notifications.argoproj.io/subscribe.on-sync-failed.slack: monitoring-alerts
    notifications.argoproj.io/subscribe.on-health-degraded.slack: monitoring-alerts
spec:
  project: default
  source:
    repoURL: https://charts.signoz.io
    chart: k8s-infra
    targetRevision: 0.15.0
    helm:
      values: |
        global:
          cloud: aks
          clusterName: gitops-aks-signoz
          deploymentEnvironment: signoz

        otelCollectorEndpoint: signoz-otel-collector.signoz.svc.cluster.local:4317
        otelInsecure: true

        presets:
          otlpExporter:
            enabled: true
          loggingExporter:
            enabled: false
          resourceDetection:
            detectors:
              - azure
              - system
          hostMetrics:
            enabled: true
            collectionInterval: 30s
          kubeletMetrics:
            enabled: true
            collectionInterval: 30s
            authType: serviceAccount
            endpoint: ${env:K8S_HOST_IP}:10250
            insecureSkipVerify: true
          kubernetesAttributes:
            enabled: true
          clusterMetrics:
            enabled: true
            collectionInterval: 30s
          k8sEvents:
            enabled: true
          logsCollection:
            enabled: true
            blacklist:
              enabled: true
              signozLogs: true
              namespaces:
                - kube-system
          prometheus:
            enabled: true
            annotationsPrefix: signoz.io
            scrapeInterval: 30s
            namespaceScoped: false

  destination:
    server: https://kubernetes.default.svc
    namespace: signoz-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
