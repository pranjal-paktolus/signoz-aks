apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: signoz-root-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_REPO/aks-gitops-platform
    targetRevision: HEAD
    path: argocd/signoz-apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
